name: Repository Scanner

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyGithub requests
        
    - name: Run Repository Scanner
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SCANNER_API_URL: ${{ secrets.SCANNER_API_URL }}
        SCANNER_API_KEY: ${{ secrets.SCANNER_API_KEY }}
        REPO_NAME: ${{ github.repository }}
        COMMIT_HASH: ${{ github.sha }}
      run: |
        python -c "
        import os
        import sys
        import json
        from github import Github
        import requests
        
        # Initialize GitHub client
        g = Github(os.environ['GITHUB_TOKEN'])
        repo = g.get_repo(os.environ['REPO_NAME'])
        
        # Get commit data
        commit = repo.get_commit(os.environ['COMMIT_HASH'])
        
        # Analyze changes (simplified for template)
        results = {
            'commit_hash': os.environ['COMMIT_HASH'],
            'repository': os.environ['REPO_NAME'],
            'files_changed': [file.filename for file in commit.files],
            'timestamp': commit.commit.author.date.isoformat() if commit.commit.author.date else None,
            'message': commit.commit.message
        }
        
        # Send to your website
        headers = {
            'Content-Type': 'application/json',
            'X-API-Key': os.environ['SCANNER_API_KEY']
        }
        
        response = requests.post(
            os.environ['SCANNER_API_URL'],
            json=results,
            headers=headers
        )
        
        if response.status_code == 200:
            print('Scan results sent successfully')
        else:
            print(f'Failed to send results: {response.status_code}')
            sys.exit(1)
        "
        
    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: scan-results
        path: |
          *.json
          scan_*.txt
